<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>BurnoutCheck</title>
  </head>
  <body>
    <!-- 1. Header -->
    <header class="header">
      <span class="brand">BurnoutCheck</span>
      <span id="statusDot" class="status-dot"></span>
    </header>

    <!-- 2. Score ring -->
    <div class="ring-wrap">
      <canvas id="ring" width="140" height="140"></canvas>
      <div class="ring-center">
        <div id="scoreNum" class="score-num">–</div>
        <div id="statusLabel" class="status-label">Loading…</div>
      </div>
    </div>

    <!-- 3. Stats row -->
    <div class="stats">
      <div class="stat">
        <div id="statTabs" class="stat-val">–</div>
        <div class="stat-label">tabs</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div id="statSwitches" class="stat-val">–</div>
        <div class="stat-label">switches/min</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div id="statSession" class="stat-val">–</div>
        <div class="stat-label">session min</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- 5. Trigger pills -->
    <div id="triggers" class="triggers"></div>

    <!-- 6. Intervention callout -->
    <div id="intervention" class="intervention"></div>

    <!-- 7. Action buttons -->
    <div id="actions" class="actions"></div>

    <!-- 8. Sparkline -->
    <div class="sparkline-label">7-day trend</div>
    <canvas id="sparkline" width="280" height="48" class="sparkline"></canvas>

    <!-- 9. Privacy note -->
    <div class="privacy">
      No page content is ever read. Only tab counts and titles.
    </div>

    <script src="popup.js"></script>
  </body>
</html>
