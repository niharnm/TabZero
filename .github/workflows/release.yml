name: Release

# Cut a release by pushing a tag like v0.1.0, or run manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-app:
    name: Build macOS app (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install desktop deps
        working-directory: desktop
        run: npm install

      - name: Generate app icons
        working-directory: desktop
        run: |
          magick -size 1024x1024 xc:'#7c3aed' -gravity center \
            -fill white -font Helvetica-Bold -pointsize 420 -annotate 0 'T0' \
            icon-source.png
          npx --yes @tauri-apps/cli icon icon-source.png

      - name: Inject deployed app URL
        working-directory: desktop
        run: |
          URL="${{ vars.TABZERO_APP_URL }}"
          if [ -z "$URL" ]; then URL="https://tabzero.app"; fi
          sed -i '' "s|__TABZERO_URL__|$URL|g" ui/index.html
          echo "Using TabZero URL: $URL"

      - name: Build & publish macOS app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          args: --target universal-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: "TabZero ${{ github.ref_name }}"
          releaseBody: "Native macOS build of TabZero. Unsigned — first launch: right-click the app → Open."
          releaseDraft: false
          prerelease: false

  extension:
    name: Build Chrome extension (.zip)
    runs-on: ubuntu-latest
    needs: macos-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build extension
        working-directory: extension
        run: |
          npm install
          npm run build

      - name: Zip extension
        working-directory: extension
        run: |
          cd dist
          zip -r ../tabzero-extension.zip .

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: extension/tabzero-extension.zip
